version: '3'

services:

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    user: root
    ports:
      - "8080:8080"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

  sonar:
    image: sonarqube:lts
    container_name: sonar
    ports:
      - "9000:9000"

volumes:
  jenkins_home:

